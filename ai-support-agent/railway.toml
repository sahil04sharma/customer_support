# Railway — set Root Directory to: ai-support-agent
# (NOT ai-support-agent/backend — widget lives next to backend)

[build]
buildCommand = "cd widget && npm ci && npm run build && cd ../backend && npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
