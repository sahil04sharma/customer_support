# Railway config — set Root Directory to: ai-support-agent/backend
# Docs: https://docs.railway.com/reference/config-as-code

[build]
buildCommand = "cd ../widget && npm ci && npm run build && cd ../backend && npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "npx prisma migrate deploy && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
